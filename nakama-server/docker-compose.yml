version: '3'
services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    volumes:
      - pgdata:/var/lib/postgresql/data

  nakama:
    image: heroiclabs/nakama:3.21.1
    depends_on: [postgres]
    ports:
      - "7349:7349"   # game socket
      - "7350:7350"   # HTTP API
      - "7351:7351"   # console
    volumes:
      - ./data:/nakama/data
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
          /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
          exec /nakama/nakama --name nakama --database.address postgres:localdb@postgres:5432/nakama --config /nakama/data/local.yml
volumes:
  pgdata:
